services:
  app:
    build: 
      context: .  
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    stdin_open: true
    tty: true
    env_file:
      - .env.prod
    networks:
      - app-network
    volumes:
      - node_modules:/app/node_modules
networks:
  app-network: {}

volumes:
  node_modules: